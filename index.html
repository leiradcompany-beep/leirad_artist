<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="VnQXMqYUkRAQLZa8IXmMBgXFw6in9IgTwgIYncMWeiY" />
    <meta name="google-adsense-account" content="ca-pub-8232172186255534">
    
    <!-- ==================== GOOGLE CONSENT MODE v2 ==================== -->
    <!-- Must load BEFORE AdSense or any tracking scripts -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { window.dataLayer.push(arguments); }
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'functionality_storage': 'denied',
        'personalization_storage': 'denied',
        'security_storage': 'granted',
        'wait_for_update': 500,
      });
    </script>

    <!-- Cookie Consent CSS -->
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/consent-banner-js@2.0.0/dist/styles/light.min.css">
    
    <!-- Google AdSense - Script will respect consent mode above -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8232172186255534" crossorigin="anonymous"></script>
    
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leirad G. Official</title>

    <style>
      /* Quick fix: Make consent banner match dark theme */
      #consent-banner {
        background: #18181b !important;
        color: #fff !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ==================== COOKIE CONSENT BANNER ==================== -->
    <!-- Loads BEFORE React, shows instantly -->
    <script src="https://cdn.jsdelivr.net/npm/consent-banner-js@2.0.0/dist/cb.min.js" async></script>
    
    <script>
      // Simple cookie helper functions
      function setCookie(name, value, days) {
        var d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
      }

      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      // Apply saved consent preferences immediately
      var savedConsent = getCookie('cookie_consent');
      if (savedConsent) {
        try {
          var consent = JSON.parse(savedConsent);
          gtag('consent', 'update', {
            'ad_storage': consent.ad_storage || 'denied',
            'ad_user_data': consent.ad_user_data || 'denied',
            'ad_personalization': consent.ad_personalization || 'denied',
            'analytics_storage': consent.analytics_storage || 'denied',
            'functionality_storage': consent.functionality_storage || 'denied',
            'personalization_storage': consent.personalization_storage || 'denied',
          });
        } catch (e) {
          console.error('Error parsing saved consent:', e);
        }
      }

      // Initialize consent banner when script loads
      function initConsentBanner() {
        window.addEventListener('consent-banner.ready', function() {
          window.cookiesBannerJs(
            // LOAD: Return previously saved consent
            function() {
              var saved = getCookie('cookie_consent');
              return saved ? JSON.parse(saved) : null;
            },
            // SAVE: Store consent choice
            function(consentState) {
              // Save to cookie for 365 days
              setCookie('cookie_consent', JSON.stringify(consentState), 365);
              
              // Update Google Consent Mode
              gtag('consent', 'update', {
                'ad_storage': consentState.ad_storage || 'denied',
                'ad_user_data': consentState.ad_user_data || 'denied',
                'ad_personalization': consentState.ad_personalization || 'denied',
                'analytics_storage': consentState.analytics_storage || 'denied',
                'functionality_storage': consentState.functionality_storage || 'denied',
                'personalization_storage': consentState.personalization_storage || 'denied',
              });
              
              console.log('Cookie preferences saved:', consentState);
            },
            // CONFIG: Customize the banner
            {
              privacyPolicy: '/privacy',
              denyButtonText: 'Deny All',
              acceptButtonText: 'Accept All',
              customiseButtonText: 'Customize',
              headerText: 'We value your privacy',
              messageText: 'We use cookies to enhance your browsing experience, serve personalized ads, and analyze our traffic. By clicking "Accept All", you consent to our use of cookies.',
              showCustomizeButton: true,
              categories: {
                necessary: {
                  title: 'Necessary',
                  description: 'Essential cookies required for the website to function properly.',
                  default: true,
                  readOnly: true,
                },
                analytics: {
                  title: 'Analytics',
                  description: 'Help us understand how visitors interact with our website.',
                  default: false,
                },
                advertisement: {
                  title: 'Advertisement',
                  description: 'Used to show relevant ads and measure ad performance.',
                  default: false,
                },
                functional: {
                  title: 'Functional',
                  description: 'Enable additional features and personalization.',
                  default: false,
                },
              },
            }
          );
        });
      }

      // Run immediately if script already loaded, otherwise wait
      if (window.cookiesBannerJs) {
        initConsentBanner();
      } else {
        var script = document.querySelector('script[src*="cb.min.js"]');
        if (script) {
          script.addEventListener('load', initConsentBanner);
        }
      }
    </script>

    <!-- React App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
